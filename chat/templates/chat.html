<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FALL Chat</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --border: #333;
            --text: #e0e0e0;
            --text-secondary: #888;
            --accent: #00ff88;
            --accent-dim: #00cc66;
            --user-bg: #1a3a2a;
            --assistant-bg: #1a1a2a;
            --danger: #ff4444;
            --warning: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: var(--danger);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border: 1px solid #2a4a3a;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--assistant-bg);
            border: 1px solid #2a2a4a;
        }

        .message .role {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: var(--accent);
        }

        .message.user .role {
            color: #66ffaa;
        }

        .message.system {
            align-self: center;
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-secondary);
            font-size: 12px;
            max-width: 70%;
            text-align: center;
        }

        /* Input Area */
        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            border-color: var(--accent);
        }

        .input-area button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .input-area button:hover {
            background: var(--accent-dim);
        }

        .input-area button:disabled {
            background: var(--border);
            cursor: not-allowed;
            color: var(--text-secondary);
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: 6px;
            padding: 2px;
        }

        .mode-toggle button {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-toggle button.active {
            background: var(--accent);
            color: var(--bg);
        }

        /* Loading */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 14px 18px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>⚡ FALL</h1>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Connected</span>
            <span style="margin-left: 12px; color: var(--text-secondary);">|</span>
            <button onclick="newSession()" style="background:transparent;border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;">New Chat</button>
        </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-container" id="chatContainer">
        <div class="message system">
            ⚡ FALL Chat Ready<br>
            Interactive mode: ask questions, write code, analyze data.<br>
            Autonomous mode: the agent will use tools to complete tasks.
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="mode-toggle">
            <button id="modeInteractive" class="active" onclick="setMode('interactive')">💬 Chat</button>
            <button id="modeAutonomous" onclick="setMode('autonomous')">🤖 Agent</button>
        </div>
        <textarea 
            id="userInput" 
            placeholder="Type your message..." 
            rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
        ></textarea>
        <button id="sendButton" onclick="sendMessage()">Send ⚡</button>
    </div>

    <script>
        let sessionId = null;
        let mode = 'interactive';
        let isWaiting = false;

        // Initialize
        async function init() {
            const resp = await fetch('/api/sessions/new', { method: 'POST' });
            const data = await resp.json();
            sessionId = data.session_id;
        }

        function setMode(m) {
            mode = m;
            document.getElementById('modeInteractive').classList.toggle('active', m === 'interactive');
            document.getElementById('modeAutonomous').classList.toggle('active', m === 'autonomous');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || isWaiting) return;

            input.value = '';
            isWaiting = true;
            document.getElementById('sendButton').disabled = true;

            // Add user message
            addMessage('user', message);

            // Add typing indicator
            const typingId = addTypingIndicator();

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        mode: mode,
                    }),
                });

                const data = await resp.json();
                removeTypingIndicator(typingId);
                addMessage('assistant', data.message);
            } catch (e) {
                removeTypingIndicator(typingId);
                addMessage('system', 'Error: Could not reach server');
            }

            isWaiting = false;
            document.getElementById('sendButton').disabled = false;
            document.getElementById('userInput').focus();
        }

        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const roleLabel = document.createElement('div');
            roleLabel.className = 'role';
            roleLabel.textContent = role === 'user' ? 'YOU' : 'FALL';

            div.appendChild(roleLabel);
            div.appendChild(document.createTextNode(content));
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addTypingIndicator() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typing-' + Date.now();
            div.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div.id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        async function newSession() {
            const resp = await fetch('/api/sessions/new', { method: 'POST' });
            const data = await resp.json();
            sessionId = data.session_id;
            document.getElementById('chatContainer').innerHTML = '';
            addMessage('system', 'New session started.');
        }

        // Start
        init();
    </script>
</body>
</html>
