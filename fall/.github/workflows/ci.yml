name: FALL CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff black mypy
      - run: ruff check fall/
      - run: black --check fall/
      - run: mypy fall/ --ignore-missing-imports

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest fall/tests/ -x -v --timeout=120

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: |
          python -m fall.sandbox.manager &
          sleep 5
          python -m fall.inference.api &
          sleep 10
          curl -X POST http://localhost:8000/v1/execute \
            -H "X-API-Key: sk-test" \
            -d '{"task": "echo hello", "mode": "interactive"}'

  build-docker:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fall:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  benchmarks:
    runs-on: [self-hosted, gpu]
    needs: unit-tests
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e ".[dev]"
      - run: python -m fall.evaluation.benchmarks --quick
        env:
          FALL_API_KEY: ${{ secrets.FALL_API_KEY }}
          FALL_BASE_URL: http://localhost:8000