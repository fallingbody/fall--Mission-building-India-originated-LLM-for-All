name: FALL Deploy

on:
  release:
    types: [published]

jobs:
  deploy-to-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/fall-ai/fall:${{ github.ref_name }}
            ghcr.io/fall-ai/fall:latest

  integration-tests-staging:
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - run: pip install fall-client
      - run: |
          python -c "
          from fall.sdk.client import FALLClient
          client = FALLClient(api_key='${{ secrets.STAGING_API_KEY }}', base_url='${{ vars.STAGING_URL }}')
          result = client.execute('ping localhost')
          assert result.status == 'complete'
          "

  deploy-to-production:
    runs-on: ubuntu-latest
    needs: integration-tests-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -X POST ${{ vars.PROD_DEPLOY_URL }} \
            -H "Authorization: Bearer ${{ secrets.PROD_DEPLOY_TOKEN }}" \
            -d '{"version": "${{ github.ref_name }}"}'